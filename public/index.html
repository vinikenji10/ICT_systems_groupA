<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIT Club Hub — Explore Student Clubs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="#" class="navbar-brand">
      <img src="https://firebasestorage.googleapis.com/v0/b/ict-systems-project-a.firebasestorage.app/o/Assets%2FShibaura_Institute_of_Technology_logo.svg.png?alt=media&token=4c5c6f60-96a7-41e9-a5f0-6b6ed4518ba3" alt="SIT Logo">
      <span>SIT Club Hub</span>
    </a>
    <div class="navbar-search">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="searchInput" placeholder="Search clubs by name or sport...">
    </div>
    <ul class="navbar-links">
      <li><a href="#" class="nav-hide-mobile">Explore Clubs</a></li>
      <li><a href="#" class="nav-hide-mobile">Events</a></li>
      <li><a href="#" class="leader-link"><span class="nav-hide-mobile">Leader Login</span> &#x1F464;</a></li>
      <li><a href="#" class="nav-hide-mobile">Support</a></li>
    </ul>
  </nav>

  <div class="layout">

    <aside class="sidebar" id="sidebar">
      <h3>Filter Clubs</h3>

      <div class="filter-group">
        <h3>Sport Type</h3>
        <label><input type="checkbox" class="filter-checkbox" data-group="sportType" data-value="Teams"> Teams</label>
        <label><input type="checkbox" class="filter-checkbox" data-group="sportType" data-value="Martial Arts"> Martial Arts</label>
        <label><input type="checkbox" class="filter-checkbox" data-group="sportType" data-value="Individual"> Individual</label>
      </div>

      <div class="filter-group">
        <h3>Activity Level</h3>
        <label><input type="checkbox" class="filter-checkbox" data-group="activityLevel" data-value="Competitive"> Competitive</label>
        <label><input type="checkbox" class="filter-checkbox" data-group="activityLevel" data-value="Recreational"> Recreational</label>
      </div>

      <div class="filter-group">
        <h3>Status</h3>
        <label><input type="checkbox" class="filter-checkbox" data-group="status" data-value="Active"> Active</label>
        <label><input type="checkbox" class="filter-checkbox" data-group="status" data-value="Recruiting"> Recruiting</label>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <h1 class="slogan">Discover Your Community</h1>
      <p class="slogan-sub">Explore Student Clubs at SIT</p>

      <button class="mobile-filter-toggle" id="mobileFilterToggle">&#x2630; Show Filters</button>

      <div class="club-grid" id="clubGrid"></div>
    </main>

  </div>

  <footer class="footer">
    <p>&copy; 2025 SIT Club Hub &mdash; Shibaura Institute of Technology &bull; <a href="#">Privacy Policy</a> &bull; <a href="#">Contact</a></p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
